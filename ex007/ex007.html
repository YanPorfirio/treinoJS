<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="ex007.css">
    <link rel="shortcut icon" href="image/exam.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>

    <section>
        <div class="content">
            <p>Ano de Nascimento:</p>
            <input class="ano" type="number" name="txtano" id="txtano">
        </div>
        <div class="content">
            <p class="genero">Sexo:</p>
            <input class="sexo" type="radio" name="radsex" id="mas">
            <label for="mas">Masculino</label>
            <input class="sexo" type="radio" name="radsex" id="fem">
            <label for="fem">Feminino</label>
        </div>
        <div class="content">
            <input class="btn" type="button" value="Verificar">
        </div>
        <div class="content resultado">
            <p class="resultado" id="res">Preencha os dados acima para verificar sua idade.</p>
        </div>
    </section>

    <footer>
        <p class="rodape">&copy; 2026 - Treino de JavaScript</p>
    </footer>

    <script src="ex007.js" defer></script>
</body>
</html>
