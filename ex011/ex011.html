<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="ex011.css">
    <link rel="shortcut icon" href="" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>
    <section>
        <div class="content">
            <p>Escolha um número:</p>
            <input type="number" name="tabuada" id="tabuada">
        </div>
        <div class="content-btn">
            <input class="btn" type="button" id="btn" value="Contar">
        </div>

        <hr>

        <div class="tabuada">
            <select class="tab" name="tab" id="tab" size="10">
                <option value="">Digite um número acima</option>
            </select>
        </div>
 
    </section>
    <footer>
        <p>Treino de Javascript</p>
    </footer>
    <script src="ex011.js" defer></script>
</body>
</html>
