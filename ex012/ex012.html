<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="ex012.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>

    <main>
        <section>
            <div class="input-section">
                <p>Número (1 a 100):</p>
                <div class="input-group">
                    <input type="number" name="num" id="fnum" placeholder="0">
                    <input type="button" value="Adicionar" onclick="adicionar()">
                </div>
            </div>

            <select name="flista" id="flista" size="10"></select>
            <input type="button" value="Finalizar" onclick="finalizar()">

            <div id="res">
                <p>Aguardando números...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; Treino de Javascript</p>
    </footer>
    
    <script src="ex012.js"></script>
</body>
</html>
